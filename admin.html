<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>癌症委員會 — 管理後台</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#F0F4F8;color:#1F2937;font-size:15px;line-height:1.7}
.topbar{background:#004E56;color:#fff;padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:800}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 80px}
.card{background:#fff;border-radius:12px;border:1px solid #D1D5DB;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:20px}
.card-head{background:#006D77;color:#fff;padding:12px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px}
.card-head h2{font-size:15px;font-weight:700;flex:1}
.card-body{padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;background:#F9FAFB;padding:12px 16px;border-radius:10px;border:1px solid #D1D5DB}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-teal{background:#006D77;color:#fff}
.btn-outline{background:#fff;border:1.5px solid #D1D5DB;color:#374151}
.tab-row{display:flex;border-bottom:2px solid #D1D5DB;margin-bottom:16px}
.tab{padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;color:#6B7280}
.tab.active{background:#006D77;color:#fff}
.tab:hover:not(.active){background:#EDF6F7;color:#004E56}
select{padding:7px 12px;border:1.5px solid #D1D5DB;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;background:#fff}
.grp-block{border:1px solid #D1D5DB;border-radius:10px;margin-bottom:10px;overflow:hidden}
.grp-head{background:#006D77;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.grp-head h3{font-size:14px;font-weight:700;flex:1}
.grp-body{display:none}
.grp-body.open{display:block}
.ind-row{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid #F3F4F6;cursor:pointer}
.ind-row:hover{background:#F8FAFB}
.ind-row.assigned{background:#F0FDF4}
.ind-no{background:#006D77;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;flex-shrink:0}
.ind-name{font-size:13px;font-weight:600;flex:1}
.ind-tag{background:#D1FAE5;color:#065F46;font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EDF6F7;border:1px solid #83C5BE;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#004E56;margin:3px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#006D77;flex-shrink:0}
#status-bar{font-size:13px;font-weight:600;min-height:20px;margin-top:8px}
.drop-zone{border:2px dashed #83C5BE;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#FAFFFE}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">🏥 雙和醫院癌症委員會 — 管理後台</div>
  <span id="top-count" style="margin-left:auto;font-size:12px;opacity:.8"></span>
</div>
<div class="wrap">
<div class="card">
  <div class="card-head"><span>📋</span><h2>指標派送</h2><span style="font-size:12px;opacity:.8">勾選指標 → 選委員 → 產生個人化問卷</span></div>
  <div class="card-body">
    <div class="toolbar">
      <button class="btn btn-outline" onclick="checkAll(true)">☑ 全選</button>
      <button class="btn btn-outline" onclick="checkAll(false)">☐ 全不選</button>
      <div style="width:1px;height:28px;background:#D1D5DB"></div>
      <label style="font-size:13px;font-weight:600;color:#6B7280">派送給：</label>
      <select id="sel-member"><option value="">— 選擇委員 —</option></select>
      <button class="btn btn-teal" onclick="doGenerate()">📤 產生問卷</button>
      <div id="gen-status" style="font-size:13px;font-weight:600;color:#1E7C5A"></div>
    </div>
    <div id="summary-bar" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;min-height:28px"></div>
    <div class="tab-row">
      <div class="tab active" id="tab-nm" onclick="switchGrp('nm')">非醫療 G1–G7</div>
      <div class="tab" id="tab-med" onclick="switchGrp('med')">醫療 G8–G15</div>
      <div class="tab" id="tab-all" onclick="switchGrp('all')">📦 全部記錄</div>
    </div>
    <div id="ind-list"></div>
  </div>
</div>
<div class="card">
  <div class="card-head"><span>📥</span><h2>匯入 Excel 更新指標數字</h2></div>
  <div class="card-body">
    <div class="drop-zone" id="excel-drop">
      <div style="font-size:28px;margin-bottom:8px">📂</div>
      <div style="font-size:14px;font-weight:600;color:#004E56;margin-bottom:4px">拖放直表 Excel 到這裡，或點擊選擇</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:12px">格式：西元年份 / 組別 / 指標項目 / 癌別 / 閾值 / 執行成果 / 分子 / 分母 / 分析</div>
      <label class="btn btn-teal">選擇 Excel<input type="file" accept=".xlsx,.xls" style="display:none" id="excel-input"></label>
    </div>
    <div id="excel-status" style="margin-top:12px;font-size:13px"></div>
  </div>
</div>
</div>

var curGrp = "nm";
var asgn = {};
    h += " <button data-m='" + m + "' onclick='reDownload(this.dataset.m)' style='background:none;border:none;cursor:pointer;color:#006D77;font-size:11px;text-decoration:underline;font-family:inherit'>重下</button>";

// Survey HTML templates fetched from same-origin or embedded as data URL

window.onload = function() {
  buildSelect();
  renderList();
  renderSummary();

};

function buildSelect() {
  var sel = document.getElementById("sel-member");
  var ms = curGrp === "nm" ? MEMBERS_NM : curGrp === "med" ? MEMBERS_MED : MEMBERS_NM.concat(MEMBERS_MED);
  sel.innerHTML = "<option value=''>— 選擇委員 —</option>";
  ms.forEach(function(m) {
    var o = document.createElement("option");
    o.value = m; o.textContent = m; sel.appendChild(o);
  });
}

function switchGrp(g) {
  curGrp = g;
  ["nm","med","all"].forEach(function(t) {
    document.getElementById("tab-"+t).className = "tab" + (t === g ? " active" : "");
  });
  buildSelect();
  renderList();
}

function renderList() {
  if (curGrp === "all") { renderAllRecords(); return; }
  var data = curGrp === "nm" ? GROUPS : GROUPS2;
  var el = document.getElementById("ind-list");
  var h = "";
  data.forEach(function(g) {
    if (!g.indicators || !g.indicators.length) return;
    h += "<div class='grp-block'>";
    h += "<div class='grp-head' onclick='toggleGrp(this)'>";
    h += "<input type='checkbox' onclick='event.stopPropagation();grpChk(this)' data-gid='" + g.id + "' style='width:16px;height:16px;cursor:pointer;accent-color:#fff'>";
    h += "<h3>" + g.name + "</h3>";
    h += "<span style='opacity:.8;font-size:12px'>" + g.indicators.length + " 項</span>";
    h += "<span style='font-size:11px;opacity:.7;margin-left:4px'>▼</span>";
    h += "</div>";
    h += "<div class='grp-body'>";
    g.indicators.forEach(function(ind) {
      var who = asgn[ind.id] || "";
      h += "<label class='ind-row" + (who ? " assigned" : "") + "'>";
      h += "<input type='checkbox' class='ind-chk' data-id='" + ind.id + "' data-gid='" + g.id + "'" + (who ? " checked" : "") + ">";
      h += "<span class='ind-no'>" + ind.no + "</span>";
      h += "<span class='ind-name'>" + (ind.cancer ? ind.cancer + " — " : "") + ind.name.substring(0,45) + "</span>";
      if (who) h += "<span class='ind-tag'>✓ " + who + "</span>";
      h += "</label>";
    });
    h += "</div></div>";
  });
  el.innerHTML = h;
}

function toggleGrp(head) {
  var body = head.nextElementSibling;
  body.classList.toggle("open");
  var arr = head.querySelector("span:last-child");
  if (arr) arr.textContent = body.classList.contains("open") ? "▲" : "▼";
}

function grpChk(cb) {
  var gid = cb.getAttribute("data-gid");
  document.querySelectorAll(".ind-chk[data-gid='" + gid + "']").forEach(function(c) { c.checked = cb.checked; });
}

function checkAll(val) {
  document.querySelectorAll(".ind-chk").forEach(function(cb) { cb.checked = val; });
  document.querySelectorAll(".grp-head input[type=checkbox]").forEach(function(cb) { cb.checked = val; });
}

function renderSummary() {

function renderAllRecords() {
  var allD = GROUPS.concat(GROUPS2);

    h += "<button data-m='" + m + "' onclick='reDownload(this.dataset.m)' style='background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:4px 12px;cursor:pointer;font-family:inherit;margin-left:8px'>↓ 重新下載</button>";
    h += "</div><div>";
    ids.forEach(function(id) {

      allD.forEach(function(g) { g.indicators.forEach(function(ind) { if (ind.id === id) found = ind; }); });
      if (!found) return;
      h += "<div class='ind-row'>";

  });
  h += "<button onclick='clearAll()' style='margin-top:12px;padding:6px 16px;background:#fff;border:1.5px solid #C0392B;border-radius:6px;font-size:12px;cursor:pointer;color:#C0392B;font-family:inherit'>清除所有記錄</button>";
  document.getElementById("ind-list").innerHTML = h;
}

function doGenerate() {
  var member = document.getElementById("sel-member").value;
  if (!member) { alert("請選擇委員"); return; }
  var ids = [];
  document.querySelectorAll(".ind-chk:checked").forEach(function(cb) { ids.push(cb.getAttribute("data-id")); });
  if (!ids.length) { alert("請先勾選至少一個指標"); return; }
  ids.forEach(function(id) { asgn[id] = member; });
  localStorage.setItem("admin_asgn", JSON.stringify(asgn));
  buildSurveyHTML(member, ids);
  renderList(); renderSummary();
}

function buildSurveyHTML(member, ids) {
  var status = document.getElementById("gen-status");
  status.textContent = "⏳ 產生中…"; status.style.color = "#C8963E";
  // Determine which group
  var isNM = ids.some(function(id) { return id.startsWith("g1-") || id.startsWith("g2-") || id.startsWith("g3-") || id.startsWith("g4-") || id.startsWith("g5-") || id.startsWith("g6-") || id.startsWith("g7-"); });
  var data = isNM ? GROUPS : GROUPS2;
  var filtered = [];
  data.forEach(function(g) {
    var fi = g.indicators.filter(function(ind) { return ids.indexOf(ind.id) > -1; });
    if (fi.length) {
      var gc = JSON.parse(JSON.stringify(g));
      gc.indicators = fi; gc.total = fi.length;
      filtered.push(gc);
    }
  });
  if (!filtered.length) { status.textContent = "❌ 無對應指標"; return; }
  var tplName = isNM ? "Survey_group1_\u975e\u91ab\u7642.html" : "Survey_group2_\u91ab\u7642.html";
  var xhr = new XMLHttpRequest();
  xhr.open("GET", tplName, false);
  try { xhr.send(); } catch(e) {
    // Try simplified filenames
    try { xhr.open("GET", isNM ? "survey_group1.html" : "survey_group2.html", false); xhr.send(); } catch(e2) {
      status.textContent = "⚠️ 請先把三個檔案放在同一資料夾，或上傳到 GitHub Pages 再使用派送功能";
      return;
    }
  }
  if (xhr.status !== 200 && xhr.status !== 0) { status.textContent = "❌ 無法讀取問卷模板 (" + xhr.status + ")"; return; }
  var html = xhr.responseText;
  html = html.replace("var _bakedGroups = null;", "var _bakedGroups = " + JSON.stringify(filtered) + ";");
  var blob = new Blob([html], { type: "text/html;charset=utf-8" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  var dt = new Date().toISOString().slice(5,10).replace("-","月") + "日";
  a.download = "問卷_" + member + "_" + ids.length + "項_" + dt + ".html";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 5000);
  status.textContent = "✅ 下載完成！在下載資料夾取檔";
  setTimeout(function() { status.textContent = ""; }, 5000);
}

function reDownload(member) {
  var ids = Object.keys(asgn).filter(function(k) { return asgn[k] === member; });
  if (ids.length) buildSurveyHTML(member, ids);
}

function clearAll() {
  if (confirm("確定清除所有派送記錄？")) {
    asgn = {};
    localStorage.removeItem("admin_asgn");
    renderList(); renderSummary();
  }
}

// Excel Import
function setupExcel() {
  var dz = document.getElementById("excel-drop");
  var inp = document.getElementById("excel-input");
  inp.addEventListener("change", function() { if (this.files[0]) importExcel(this.files[0]); });
  dz.addEventListener("dragover", function(e) { e.preventDefault(); dz.style.borderColor="#006D77"; });
  dz.addEventListener("dragleave", function() { dz.style.borderColor="#83C5BE"; });
  dz.addEventListener("drop", function(e) {
    e.preventDefault(); dz.style.borderColor="#83C5BE";
    if (e.dataTransfer.files[0]) importExcel(e.dataTransfer.files[0]);
  });
  dz.addEventListener("click", function(e) { if (e.target.tagName !== "INPUT") inp.click(); });
}

function importExcel(file) {
  var status = document.getElementById("excel-status");
  status.textContent = "⏳ 讀取 " + file.name + "…";
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
      if (wb.SheetNames.length > 1) {
        var h = "請選擇工作表：";
        wb.SheetNames.forEach(function(n) {
          // h += "<button onclick="processSheet(window._xlwb,'" + n + "')" style='margin:3px;padding:5px 12px;background:#fff;border:1.5px solid #83C5BE;border-radius:6px;font-size:13px;cursor:pointer'>" + n + "</button>";
        });
        // Fix the onclick properly
        var picker = document.createElement("div");
        picker.style.marginTop = "8px";
        var btns = wb.SheetNames.map(function(n) {
          var btn = document.createElement("button");
          btn.textContent = n;
          btn.style.cssText = "margin:3px;padding:5px 12px;background:#fff;border:1.5px solid #83C5BE;border-radius:6px;font-size:13px;cursor:pointer";
          btn.addEventListener("click", function() { processSheet(wb, n); });
          return btn;
        });
        var label = document.createElement("span");
        label.textContent = "請選擇工作表：";
        picker.appendChild(label);
        btns.forEach(function(b) { picker.appendChild(b); });
        status.textContent = "";
        status.appendChild(picker);
        window._xlwb = wb; return;
      }
      processSheet(wb, wb.SheetNames[0]);
    } catch(err) { status.textContent = "❌ " + err.message; }
  };
  reader.readAsArrayBuffer(file);
}

function processSheet(wb, sheetName) {
  var status = document.getElementById("excel-status");
  if (status.firstChild && status.firstChild.nodeType !== 3) status.innerHTML = "";
  var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "", header: 1 });
  if (!rows.length) { status.textContent = "❌ 空工作表"; return; }
  var hdrs = rows[0].map(function(h) { return String(h || "").trim(); });
  var C = {};
  hdrs.forEach(function(h, i) {
    var hc = h.replace(/\s/g, "");
    if (hc.includes("年份") || hc.includes("年度")) C.yr = i;
    else if (hc.includes("組別")) C.grp = i;
    else if (hc.includes("指標") || hc.includes("項目")) C.item = i;
    else if (hc.includes("癌別")) C.can = i;
    else if (hc.includes("閾值")) C.thr = i;
    else if (hc.includes("執行") || hc.includes("成果")) C.res = i;
    else if (hc.includes("分子")) C.num = i;
    else if (hc.includes("分母")) C.den = i;
    else if (hc.includes("分析") || hc.includes("改善")) C.ana = i;
  });
  var GM = { "抗癌藥物安全組":"g1","影像診斷品質提升組":"g2","社區篩檢發展推動組":"g3","安寧療護推動組":"g4","營養衛教組":"g5","社工服務組":"g6","心理腫瘤醫療服務組":"g7" };
  function mGid(it) {
    var s = String(it || "").replace(/\s/g, "");
    if (s.includes("診斷期")) return "g8";
    if (s.includes("治療期")) return "g9";
    if (s.includes("計") && s.includes("書")) return "g10";
    if (s.includes("非動態")) return "g11";
    if (s.includes("動態")) return "g12";
    if (s.includes("失聯")) return "g13";
    if (s.includes("留") && s.includes("治")) return "g14";
    if (s.includes("完") && s.includes("治")) return "g15";
    return "g8";
  }
  function fp(v) {
    var s = String(v || "").trim();
    if (!s || s === "-" || s === "—") return "";
    try { var f = parseFloat(s); if (isNaN(f)) return s; return f > 0 && f <= 1 ? (f*100).toFixed(1).replace(".0","")+"%" : (Number.isInteger(f) ? f+"%" : f.toFixed(1)+"%"); } catch(e) { return s; }
  }
  function ffr(n, d) {
    try { var ni=parseInt(parseFloat(String(n||""))), di=parseInt(parseFloat(String(d||""))); return (isNaN(ni)||isNaN(di))?"":ni+"/"+di; } catch(e) { return ""; }
  }
  var pivot = {}, years = {};
  for (var ri = 1; ri < rows.length; ri++) {
    var r = rows[ri];
    var yr = String(r[C.yr] || "").trim();
    var grp = String(r[C.grp] || "").trim();
    if (!yr || !grp) continue;
    var gid = GM[grp] || "";
    if (!gid) { Object.keys(GM).forEach(function(k) { if (grp.includes(k) || k.includes(grp)) gid = GM[k]; }); }
    if (!gid && (grp.includes("多專科") || grp.includes("個案管理"))) gid = mGid(String(r[C.item] || ""));
    if (!gid) continue;
    var ynum = yr.replace(/[^0-9]/g, "");
    if (ynum.length === 3) ynum = (parseInt(ynum) + 1911).toString(); // ROC to western
    years[ynum] = 1;
    var key = gid + "||" + String(r[C.item] || "").trim() + "||" + String(r[C.can] || "").trim();
    if (!pivot[key]) pivot[key] = { gid: gid, years: {} };
    pivot[key].years[ynum] = { t: fp(r[C.thr]), r: fp(r[C.res]), frac: ffr(r[C.num], r[C.den]), ana: String(r[C.ana] || "").trim() };
  }
  var allData = GROUPS.concat(GROUPS2);
  var updated = 0;
  allData.forEach(function(g) {
    g.indicators.forEach(function(ind) {
      var gid = ind.id.split("-")[0];
      var bestKey = null;
      Object.keys(pivot).forEach(function(k) {
        var p = pivot[k];
        if (p.gid !== gid) return;
        var cn = (ind.cancer || "").replace(/\s/g, "");
        var pn = k.split("||")[2].replace(/\s/g, "");
        if (cn && pn && (cn === pn || cn.includes(pn) || pn.includes(cn))) bestKey = k;
      });
      if (!bestKey) return;
      var p = pivot[bestKey];
      Object.keys(p.years).forEach(function(ynum) {
        var d = p.years[ynum];
        if (d.t) ind["t" + ynum] = d.t;
        if (d.r) ind["r" + ynum] = d.r;
        if (d.frac) ind["frac" + ynum] = d.frac;
        if (d.ana && ynum === "114") ind.analysis = d.ana;
      });
      updated++;
    });
  });
  status.textContent = "✅ 更新完成！" + updated + " 個指標已更新（年份：" + Object.keys(years).join("、") + "）";
  status.style.color = "#1E7C5A";
  renderList();
}
