<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>癌症委員會 — 管理後台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#F0F4F8;color:#1F2937;font-size:15px;line-height:1.7}
.topbar{background:#004E56;color:#fff;padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:800}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 80px}
.card{background:#fff;border-radius:12px;border:1px solid #D1D5DB;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:20px}
.card-h{background:#006D77;color:#fff;padding:12px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px}
.card-h h2{font-size:15px;font-weight:700;flex:1}
.card-b{padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;background:#F9FAFB;padding:12px 16px;border-radius:10px;border:1px solid #D1D5DB}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-t{background:#006D77;color:#fff}
.btn-o{background:#fff;border:1.5px solid #D1D5DB;color:#374151}
.tab-row{display:flex;border-bottom:2px solid #D1D5DB;margin-bottom:16px}
.tab{padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;color:#6B7280}
.tab.on{background:#006D77;color:#fff}
.tab:hover:not(.on){background:#EDF6F7;color:#004E56}
select,input[type=text]{padding:7px 12px;border:1.5px solid #D1D5DB;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;background:#fff}
.gb{border:1px solid #D1D5DB;border-radius:10px;margin-bottom:10px;overflow:hidden}
.gh{background:#006D77;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.gh h3{font-size:14px;font-weight:700;flex:1}
.gi{display:none}.gi.open{display:block}
.ir{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid #F3F4F6;cursor:pointer}
.ir:hover{background:#F8FAFB}.ir.asgn{background:#F0FDF4}
.ino{background:#006D77;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;flex-shrink:0}
.inm{font-size:13px;font-weight:600;flex:1}
.itg{background:#D1FAE5;color:#065F46;font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:6px;background:#EDF6F7;border:1px solid #83C5BE;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#004E56;margin:3px}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#006D77;flex-shrink:0}
.member-tag{display:inline-flex;align-items:center;gap:4px;background:#EDF6F7;border:1px solid #83C5BE;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:#004E56;margin:2px}
.member-tag .x{cursor:pointer;color:#C0392B;font-weight:800;margin-left:4px}
</style>
</head>
<body>
<div class="topbar">
  <h1>🏥 雙和醫院癌症委員會 — 管理後台</h1>
  <span id="tc" style="margin-left:auto;font-size:12px;opacity:.8"></span>
</div>
<div class="wrap">

<!-- 1. 委員管理 -->
<div class="card">
  <div class="card-h"><span>👥</span><h2>委員名單管理</h2></div>
  <div class="card-b">
    <div style="margin-bottom:16px">
      <b style="color:#004E56">非醫療第1組</b>
      <div id="members-nm" style="margin:6px 0"></div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="add-nm" placeholder="輸入新委員姓名" style="flex:1">
        <button class="btn btn-t" onclick="addMember('nm')">＋ 新增</button>
      </div>
    </div>
    <div>
      <b style="color:#004E56">醫療第2組</b>
      <div id="members-med" style="margin:6px 0"></div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="add-med" placeholder="輸入新委員姓名" style="flex:1">
        <button class="btn btn-t" onclick="addMember('med')">＋ 新增</button>
      </div>
    </div>
  </div>
</div>

<!-- 2. 指標派送 -->
<div class="card">
  <div class="card-h"><span>📋</span><h2>指標派送</h2><span style="font-size:12px;opacity:.8">勾選指標 → 選委員 → 產生問卷</span></div>
  <div class="card-b">
    <div class="toolbar">
      <button class="btn btn-o" onclick="ckAll(true)">☑ 全選</button>
      <button class="btn btn-o" onclick="ckAll(false)">☐ 全不選</button>
      <div style="width:1px;height:28px;background:#D1D5DB"></div>
      <label style="font-size:13px;font-weight:600;color:#6B7280">派送給：</label>
      <select id="sel-m"><option value="">— 選擇委員 —</option></select>
      <button class="btn btn-t" onclick="doGen()">📤 產生問卷</button>
      <div id="gs" style="font-size:13px;font-weight:600;color:#1E7C5A"></div>
    </div>
    <div id="sum" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;min-height:28px"></div>
    <div class="tab-row">
      <div class="tab on" id="t-nm" onclick="swGrp('nm')">非醫療 G1–G7</div>
      <div class="tab" id="t-med" onclick="swGrp('med')">醫療 G8–G15</div>
      <div class="tab" id="t-all" onclick="swGrp('all')">📦 全部記錄</div>
    </div>
    <div id="il"></div>
  </div>
</div>

<!-- 3. Excel匯入 -->
<div class="card">
  <div class="card-h"><span>📥</span><h2>匯入 Excel 更新指標數字</h2></div>
  <div class="card-b">
    <div style="margin-bottom:12px">
      <b style="font-size:13px;color:#004E56">顯示年份：</b>
      <label style="margin:0 8px"><input type="checkbox" id="yr-112" checked> 112年</label>
      <label style="margin:0 8px"><input type="checkbox" id="yr-113" checked> 113年</label>
      <label style="margin:0 8px"><input type="checkbox" id="yr-114" checked> 114年</label>
      <label style="margin:0 8px"><input type="checkbox" id="yr-115"> 115年</label>
      <label style="margin:0 8px"><input type="checkbox" id="yr-116"> 116年</label>
      <button class="btn btn-o" onclick="saveYears()" style="margin-left:8px;padding:4px 12px">儲存年份設定</button>
    </div>
    <div id="xl-drop" style="border:2px dashed #83C5BE;border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:#FAFFFE">
      <div style="font-size:28px;margin-bottom:8px">📂</div>
      <div style="font-size:14px;font-weight:600;color:#004E56;margin-bottom:4px">拖放直表 Excel 到這裡，或點擊選擇</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:12px">格式：西元年份 / 組別 / 指標項目 / 癌別 / 閾值 / 執行成果 / 分子 / 分母 / 分析</div>
      <label class="btn btn-t">選擇 Excel<input type="file" accept=".xlsx,.xls" style="display:none" id="xl-in"></label>
    </div>
    <div id="xl-st" style="margin-top:12px;font-size:13px"></div>
  </div>
</div>

</div>

    var el=document.getElementById("members-"+t);
    el.innerHTML=ms.map(function(m){
      return "<span class='member-tag'>"+m+"<span class='x' data-t='"+t+"' data-m='"+m+"' onclick='removeMember(this)'>✕</span></span>";
    }).join("");
  });
}
function addMember(t){
  var inp=document.getElementById("add-"+t);
  var name=inp.value.trim();
  if(!name){alert("請輸入姓名");return;}
  var ms=t==="nm"?MNM:MMED;
  if(ms.indexOf(name)>-1){alert("已存在");return;}
  ms.push(name);
  localStorage.setItem("members_"+t,JSON.stringify(ms));
  inp.value="";
  renderMembers();buildSel();
}
function removeMember(el){
  var t=el.getAttribute("data-t");
  var m=el.getAttribute("data-m");
  if(!confirm("確定移除「"+m+"」？"))return;
  var ms=t==="nm"?MNM:MMED;
  var idx=ms.indexOf(m);
  if(idx>-1)ms.splice(idx,1);
  localStorage.setItem("members_"+t,JSON.stringify(ms));
  renderMembers();buildSel();
}

// ── Year Management ──
function loadYearCheckboxes(){
  YEARS.forEach(function(y){
    var cb=document.getElementById("yr-"+y);
    if(cb)cb.checked=true;
  });
  // uncheck all first
  ["112","113","114","115","116"].forEach(function(y){
    var cb=document.getElementById("yr-"+y);
    if(cb)cb.checked=YEARS.indexOf(y)>-1;
  });
}
function saveYears(){
  YEARS=[];
  ["112","113","114","115","116"].forEach(function(y){
    var cb=document.getElementById("yr-"+y);
    if(cb&&cb.checked)YEARS.push(y);
  });
  localStorage.setItem("adm_years",JSON.stringify(YEARS));
  alert("已儲存年份設定："+YEARS.join("、")+"年");
}

// ── Dispatch ──
function buildSel(){
  var sel=document.getElementById("sel-m");
  var ms=cg==="nm"?MNM:cg==="med"?MMED:MNM.concat(MMED);
  sel.innerHTML="<option value=''>— 選擇委員 —</option>";
  ms.forEach(function(m){
    var o=document.createElement("option");
    o.value=m;o.textContent=m;sel.appendChild(o);
  });
}
function swGrp(g){
  cg=g;
  ["nm","med","all"].forEach(function(t){
    document.getElementById("t-"+t).className="tab"+(t===g?" on":"");
  });
  buildSel();renderList();
}
function renderList(){
  if(cg==="all"){renderAllRec();return;}
  var data=cg==="nm"?GROUPS:GROUPS2;
  var el=document.getElementById("il");
  var h="";
  data.forEach(function(g){
    if(!g.indicators||!g.indicators.length)return;
    h+="<div class='gb'>";
    h+="<div class='gh' onclick='togGrp(this)'>";
    h+="<input type='checkbox' onclick='event.stopPropagation();gChk(this)' data-gid='"+g.id+"' style='accent-color:#fff'>";
    h+="<h3>"+g.name+"</h3>";
    h+="<span style='opacity:.8;font-size:12px'>"+g.indicators.length+" 項</span>";
    h+="<span style='font-size:11px;opacity:.7;margin-left:4px'>▼</span>";
    h+="</div><div class='gi'>";
    g.indicators.forEach(function(ind){
      var who=asgn[ind.id]||"";
      h+="<label class='ir"+(who?" asgn":"")+"'>";
      h+="<input type='checkbox' class='ic' data-id='"+ind.id+"' data-gid='"+g.id+"'"+(who?" checked":"")+">";
      h+="<span class='ino'>"+ind.no+"</span>";
      h+="<span class='inm'>"+(ind.cancer?ind.cancer+" — ":"")+ind.name.substring(0,45)+"</span>";
      if(who)h+="<span class='itg'>✓ "+who+"</span>";
      h+="</label>";
    });
    h+="</div></div>";
  });
  el.innerHTML=h;
}
function togGrp(head){
  var body=head.nextElementSibling;
  body.classList.toggle("open");
  var spans=head.querySelectorAll("span");
  spans[spans.length-1].textContent=body.classList.contains("open")?"▲":"▼";
}
function gChk(cb){
  var gid=cb.getAttribute("data-gid");
  document.querySelectorAll(".ic[data-gid='"+gid+"']").forEach(function(c){c.checked=cb.checked;});
}
function ckAll(v){
  document.querySelectorAll(".ic").forEach(function(cb){cb.checked=v;});
  document.querySelectorAll(".gh input[type=checkbox]").forEach(function(cb){cb.checked=v;});
}
function renderSum(){
  var ct={};
  Object.values(asgn).forEach(function(m){ct[m]=(ct[m]||0)+1;});
  var h="";
  Object.keys(ct).forEach(function(m){
    h+="<span class='badge'>"+m+"："+ct[m]+" 項 ";
    h+="<button data-m='"+m+"' onclick='reDL(this.dataset.m)' style='background:none;border:none;cursor:pointer;color:#006D77;font-size:11px;text-decoration:underline;font-family:inherit'>重下</button></span>";
  });
  document.getElementById("sum").innerHTML=h||"<span style='color:#6B7280;font-size:13px;font-style:italic'>尚未派送任何指標</span>";
  var total=Object.keys(asgn).length;
  document.getElementById("tc").textContent=total?"已派 "+total+" 項":"";
}
function renderAllRec(){
  var allD=GROUPS.concat(GROUPS2);
  var bm={};
  Object.entries(asgn).forEach(function(kv){
    if(!bm[kv[1]])bm[kv[1]]=[];
    bm[kv[1]].push(kv[0]);
  });
  var h="<h3 style='color:#004E56;margin-bottom:14px'>所有派送記錄</h3>";
  if(!Object.keys(bm).length){
    h+="<p style='color:#6B7280;font-style:italic'>尚未派送任何指標</p>";
    document.getElementById("il").innerHTML=h;return;
  }
  Object.keys(bm).forEach(function(m){
    var ids=bm[m];
    h+="<div class='gb'><div class='gh'>";
    h+="<h3>👤 "+m+"</h3>";
    h+="<span style='opacity:.8;font-size:12px'>"+ids.length+" 項</span>";
    h+="<button data-m='"+m+"' onclick='reDL(this.dataset.m)' style='background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:4px 12px;cursor:pointer;font-family:inherit;margin-left:8px'>↓ 重新下載</button>";
    h+="</div><div style='display:block'>";
    ids.forEach(function(id){
      var found=null;
      allD.forEach(function(g){g.indicators.forEach(function(ind){if(ind.id===id)found=ind;});});
      if(!found)return;
      h+="<div class='ir'><span class='ino'>"+found.no+"</span>";
      h+="<span class='inm'>"+(found.cancer?found.cancer+" — ":"")+found.name.substring(0,45)+"</span></div>";
    });
    h+="</div></div>";
  });
  h+="<button onclick='clrAll()' style='margin-top:12px;padding:6px 16px;background:#fff;border:1.5px solid #C0392B;border-radius:6px;font-size:12px;cursor:pointer;color:#C0392B;font-family:inherit'>清除所有記錄</button>";
  document.getElementById("il").innerHTML=h;
}

// ── Generate ──
function doGen(){
  var member=document.getElementById("sel-m").value;
  if(!member){alert("請選擇委員");return;}
  var ids=[];
  document.querySelectorAll(".ic:checked").forEach(function(cb){ids.push(cb.getAttribute("data-id"));});
  if(!ids.length){alert("請先勾選至少一個指標");return;}
  ids.forEach(function(id){asgn[id]=member;});
  localStorage.setItem("adm_asgn",JSON.stringify(asgn));
  mkHTML(member,ids);
  renderList();renderSum();
}
function mkHTML(member,ids){
  var st=document.getElementById("gs");
  st.textContent="⏳ 產生中…";st.style.color="#C8963E";
  setTimeout(function(){
    try{
      // Determine medical or non-medical by parsing group number
      var isNM=ids.every(function(id){
        var m=id.match(/^g(\d+)-/);
        return m&&parseInt(m[1])<=7;
      });
      var data=isNM?GROUPS:GROUPS2;
      var filtered=[];
      data.forEach(function(g){
        var fi=g.indicators.filter(function(ind){return ids.indexOf(ind.id)>-1;});
        if(fi.length){
          var gc=JSON.parse(JSON.stringify(g));
          gc.indicators=fi;gc.total=fi.length;
          filtered.push(gc);
        }
      });
      if(!filtered.length){st.textContent="❌ 無對應指標";return;}
      var html=_dec(isNM?_S1:_S2);
      html=html.replace("var _bakedGroups = null;","var _presetMember='"+member+"';var _bakedGroups = "+JSON.stringify(filtered)+";");
      var blob=new Blob([html],{type:"text/html;charset=utf-8"});
      var a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      var dt=new Date().toISOString().slice(5,10).replace("-","月")+"日";
      a.download="問卷_"+member+"_"+ids.length+"項_"+dt+".html";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(a.href);},5000);
      st.textContent="✅ 已下載！在下載資料夾取檔";st.style.color="#1E7C5A";
      setTimeout(function(){st.textContent="";},4000);
    }catch(err){st.textContent="❌ "+err.message;console.error(err);}
  },100);
}
function reDL(member){
  var ids=Object.keys(asgn).filter(function(k){return asgn[k]===member;});
  if(ids.length)mkHTML(member,ids);
}
function clrAll(){
  if(confirm("確定清除所有派送記錄？")){
    asgn={};localStorage.removeItem("adm_asgn");
    renderList();renderSum();
  }
}

// ── Excel Import ──
function setupXL(){
  var dz=document.getElementById("xl-drop");
  var inp=document.getElementById("xl-in");
  inp.addEventListener("change",function(){if(this.files[0])impXL(this.files[0]);});
  dz.addEventListener("dragover",function(e){e.preventDefault();dz.style.borderColor="#006D77";});
  dz.addEventListener("dragleave",function(){dz.style.borderColor="#83C5BE";});
  dz.addEventListener("drop",function(e){
    e.preventDefault();dz.style.borderColor="#83C5BE";
    if(e.dataTransfer.files[0])impXL(e.dataTransfer.files[0]);
  });
  dz.addEventListener("click",function(e){if(e.target.tagName!=="INPUT")inp.click();});
}
function impXL(file){
  var st=document.getElementById("xl-st");
  st.textContent="⏳ 讀取 "+file.name+"…";
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      if(wb.SheetNames.length>1){
        var pk=document.createElement("div");
        pk.style.marginTop="8px";
        var lbl=document.createElement("span");
        lbl.textContent="請選擇工作表：";pk.appendChild(lbl);
        wb.SheetNames.forEach(function(n){
          var btn=document.createElement("button");
          btn.textContent=n;
          btn.style.cssText="margin:3px;padding:5px 12px;background:#fff;border:1.5px solid #83C5BE;border-radius:6px;font-size:13px;cursor:pointer";
          btn.addEventListener("click",function(){procSheet(wb,n);});
          pk.appendChild(btn);
        });
        st.textContent="";st.appendChild(pk);
        return;
      }
      procSheet(wb,wb.SheetNames[0]);
    }catch(err){st.textContent="❌ "+err.message;}
  };
  reader.readAsArrayBuffer(file);
}
function procSheet(wb,sn){
  var st=document.getElementById("xl-st");
  if(st.firstChild&&st.firstChild.nodeType!==3)st.innerHTML="";
  var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:"",header:1});
  if(!rows.length){st.textContent="❌ 空工作表";return;}
  var hdrs=rows[0].map(function(h){return String(h||"").trim();});
  var C={};
  hdrs.forEach(function(h,i){
    var hc=h.replace(/\s/g,"");
    if(hc.includes("年份")||hc.includes("年度"))C.yr=i;
    else if(hc.includes("組別"))C.grp=i;
    else if(hc.includes("指標")||hc.includes("項目"))C.item=i;
    else if(hc.includes("癌別"))C.can=i;
    else if(hc.includes("閾值"))C.thr=i;
    else if(hc.includes("執行")||hc.includes("成果"))C.res=i;
    else if(hc.includes("分子"))C.num=i;
    else if(hc.includes("分母"))C.den=i;
    else if(hc.includes("分析")||hc.includes("改善"))C.ana=i;
  });
  var GM={"抗癌藥物安全組":"g1","影像診斷品質提升組":"g2","社區篩檢發展推動組":"g3","安寧療護推動組":"g4","營養衛教組":"g5","社工服務組":"g6","心理腫瘤醫療服務組":"g7"};
  function mG(it){
    var s=String(it||"").replace(/\s/g,"");
    if(s.includes("診斷期"))return "g8";if(s.includes("治療期"))return "g9";
    if(s.includes("計")&&s.includes("書"))return "g10";
    if(s.includes("非動態"))return "g11";if(s.includes("動態"))return "g12";
    if(s.includes("失聯"))return "g13";
    if(s.includes("留")&&s.includes("治"))return "g14";
    if(s.includes("完")&&s.includes("治"))return "g15";
    return "g8";
  }
  function fp(v){var s=String(v||"").trim();if(!s||s==="-"||s==="—")return "";try{var f=parseFloat(s);if(isNaN(f))return s;return f>0&&f<=1?(f*100).toFixed(1).replace(".0","")+"%":(Number.isInteger(f)?f+"%":f.toFixed(1)+"%");}catch(e){return s;}}
  function ff(n,d){try{var ni=parseInt(parseFloat(String(n||""))),di=parseInt(parseFloat(String(d||"")));return(isNaN(ni)||isNaN(di))?"":ni+"/"+di;}catch(e){return "";}}
  var pivot={},years={};
  for(var ri=1;ri<rows.length;ri++){
    var r=rows[ri];
    var yr=String(r[C.yr]||"").trim();
    var grp=String(r[C.grp]||"").trim();
    if(!yr||!grp)continue;
    var gid=GM[grp]||"";
    if(!gid)Object.keys(GM).forEach(function(k){if(grp.includes(k)||k.includes(grp))gid=GM[k];});
    if(!gid&&(grp.includes("多專科")||grp.includes("個案管理")))gid=mG(String(r[C.item]||""));
    if(!gid)continue;
    var ynum=yr.replace(/[^0-9]/g,"");
    years[ynum]=1;
    var key=gid+"||"+String(r[C.item]||"").trim()+"||"+String(r[C.can]||"").trim();
    if(!pivot[key])pivot[key]={gid:gid,years:{}};
    pivot[key].years[ynum]={t:fp(r[C.thr]),r:fp(r[C.res]),frac:ff(r[C.num],r[C.den]),ana:String(r[C.ana]||"").trim()};
  }
  var allData=GROUPS.concat(GROUPS2);
  var updated=0;
  allData.forEach(function(g){
    g.indicators.forEach(function(ind){
      var gid=ind.id.split("-")[0];
      var bestKey=null;
      Object.keys(pivot).forEach(function(k){
        var p=pivot[k];if(p.gid!==gid)return;
        var cn=(ind.cancer||"").replace(/\s/g,"");
        var pn=k.split("||")[2].replace(/\s/g,"");
        if(cn&&pn&&(cn===pn||cn.includes(pn)||pn.includes(cn)))bestKey=k;
      });
      if(!bestKey)return;
      var p=pivot[bestKey];
      Object.keys(p.years).forEach(function(ynum){
        var d=p.years[ynum];
        if(d.t)ind["t"+ynum]=d.t;
        if(d.r)ind["r"+ynum]=d.r;
        if(d.frac)ind["frac"+ynum]=d.frac;
        if(d.ana)ind.analysis=d.ana;
      });
      updated++;
    });
  });
  st.textContent="✅ 更新完成！"+updated+" 個指標已更新（年份："+Object.keys(years).join("、")+"）";
  st.style.color="#1E7C5A";renderList();
}
</script></body></html>
